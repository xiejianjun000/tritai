name: TriTai CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  wfgy-test:
    runs-on: ubuntu-latest
    name: WFGY 防幻觉引擎测试

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm ci

      - name: 运行 WFGY 验证测试
        run: node verify.js

  type-check:
    runs-on: ubuntu-latest
    name: TypeScript 类型检查
    continue-on-error: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm ci

      - name: TypeScript 类型检查
        run: npx tsc --noEmit
